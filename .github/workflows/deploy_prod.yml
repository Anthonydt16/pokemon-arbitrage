name: Test and Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm test -- --passWithNoTests

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          pip install pytest

      - name: Run Python tests
        run: python -m pytest tests/ -q

  deploy:
    name: Deploy via SCP + SSH + PM2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      IP: ${{ secrets.IP_VPS }}
      LOGIN: ${{ secrets.LOGIN_VPS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and PM2 on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.IP }}
          username: ${{ env.LOGIN }}
          password: ${{ secrets.PASSEWORD_VPS }}
          port: 22
          script: |
            if ! command -v node &> /dev/null; then
              echo "Installing Node.js 20..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2..."
              npm install -g pm2
            fi
            mkdir -p ~/pokesnoop/logs
            echo "Ready: ~/pokesnoop"

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='logs' \
            --exclude='*.log' \
            --exclude='.github' \
            --exclude='__tests__' \
            --exclude='tests' \
            --exclude='scraper/tests' \
            --exclude='preview' \
            ./ deploy-package/

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.IP }}
          username: ${{ env.LOGIN }}
          password: ${{ secrets.PASSEWORD_VPS }}
          port: 22
          source: "deploy-package/*"
          target: "~/pokesnoop"
          overwrite: true
          strip_components: 1

      - name: Build and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.IP }}
          username: ${{ env.LOGIN }}
          password: ${{ secrets.PASSEWORD_VPS }}
          port: 22
          script: |
            cd ~/pokesnoop

            echo "Configuration des variables d'environnement..."
            cat > .env <<EOF
            NODE_ENV=production
            DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'pokemon' }}:${{ secrets.POSTGRES_PASSWORD || 'pokemon' }}@localhost:5432/${{ secrets.POSTGRES_DB || 'pokemon' }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER || 'pokemon' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'pokemon' }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB || 'pokemon' }}
            WEB_PORT=3333
            SCRAPER_API_BASE=http://host.docker.internal:3333/api
            API_BASE=http://localhost:3333/api
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SCRAPER_API_KEY=${{ secrets.SCRAPER_API_KEY }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            EOF
            sed -i 's/^[[:space:]]*//' .env

            echo "Demarrage de la base de donnees..."
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi
            $COMPOSE up -d db

            echo "Installation des dependances Node.js..."
            npm install --legacy-peer-deps

            echo "Generation du client Prisma..."
            npx prisma generate

            echo "Application des migrations..."
            npx prisma migrate deploy

            echo "Build de l application Next.js..."
            npm run build

            mkdir -p logs

            echo "Demarrage du scraper..."
            $COMPOSE up -d scraper

            echo "Demarrage avec PM2..."
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save

            echo "Deploiement PokéSnoop terminé !"
            pm2 status
