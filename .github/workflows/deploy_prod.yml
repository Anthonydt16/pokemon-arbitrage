name: Deploy PokeSnoopToVPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IP:       ${{ secrets.IP_VPS }}
      LOGIN:    ${{ secrets.LOGIN_VPS }}
      SSH_PASS: ${{ secrets.PASSEWORD_VPS }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js and PM2 on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.IP }}
          username: ${{ env.LOGIN }}
          password: ${{ env.SSH_PASS }}
          port: 22
          script: |
            if ! command -v node > /dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            if ! command -v pm2 > /dev/null 2>&1; then
              npm install -g pm2
            fi
            if ! command -v nginx > /dev/null 2>&1; then
              apt-get update -q && apt-get install -y -q nginx
            fi
            mkdir -p ~/pokesnoop/logs
            echo "Serveur pret"

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='logs' \
            --exclude='*.log' \
            --exclude='.github' \
            ./ deploy-package/

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.IP }}
          username: ${{ env.LOGIN }}
          password: ${{ env.SSH_PASS }}
          port: 22
          source: "deploy-package/*"
          target: "~/pokesnoop"
          overwrite: true
          strip_components: 1

      - name: Build and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.IP }}
          username: ${{ env.LOGIN }}
          password: ${{ env.SSH_PASS }}
          port: 22
          script: |
            cd ~/pokesnoop

            cat > .env <<EOF
            NODE_ENV=production
            DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            WEB_PORT=3333
            SCRAPER_API_BASE=http://host.docker.internal:3333/api
            API_BASE=http://localhost:3333/api
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SCRAPER_API_KEY=${{ secrets.SCRAPER_API_KEY }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            EOF
            sed -i 's/^[[:space:]]*//' .env

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi
            $COMPOSE up -d db

            npm install --legacy-peer-deps
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            mkdir -p logs
            $COMPOSE up -d scraper

            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save
            pm2 startup systemd -u root --hp /root || true

            cat > /etc/nginx/sites-available/pokesnoop <<'NGINXEOF'
            server {
                listen 80;
                server_name _;
                location / {
                    proxy_pass http://localhost:3333;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection upgrade;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXEOF
            sed -i 's/^[[:space:]]*//' /etc/nginx/sites-available/pokesnoop
            ln -sf /etc/nginx/sites-available/pokesnoop /etc/nginx/sites-enabled/pokesnoop
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            ufw allow 80/tcp || true
            ufw allow 22/tcp || true

            echo "Deploiement termine !"
            echo "Site: http://$(curl -s ifconfig.me)"
            pm2 status
