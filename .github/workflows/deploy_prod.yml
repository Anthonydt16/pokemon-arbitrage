name: Test and Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Run tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm test -- --passWithNoTests

      - name: Build Next.js app
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          pip install pytest

      - name: Run Python tests
        run: python -m pytest tests/ -q

  deploy:
    name: Deploy via SSH and restart Docker
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    env:
      SSH_PASSWORD: ${{ secrets.PASSEWORD_VPS != '' && secrets.PASSEWORD_VPS || secrets.PASSWORD_VPS }}
      SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Validate SSH secrets
        run: |
          if [ -z "${{ secrets.IP_VPS }}" ]; then
            echo "Missing secret: IP_VPS"
            exit 1
          fi
          if [ -z "${{ secrets.LOGIN_VPS }}" ]; then
            echo "Missing secret: LOGIN_VPS"
            exit 1
          fi
          if [ -z "$SSH_PASSWORD" ] && [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Missing SSH credentials: set PASSEWORD_VPS or PASSWORD_VPS, or set DEPLOY_SSH_KEY"
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          PG_USER:      ${{ secrets.POSTGRES_USER }}
          PG_PASSWORD:  ${{ secrets.POSTGRES_PASSWORD }}
          PG_DB:        ${{ secrets.POSTGRES_DB }}
          ENV_JWT:      ${{ secrets.JWT_SECRET }}
          ENV_SCRAPERKEY: ${{ secrets.SCRAPER_API_KEY }}
          ENV_DISCORD:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_REPO:      ${{ github.repository }}
        with:
          host: ${{ secrets.IP_VPS }}
          username: ${{ secrets.LOGIN_VPS }}
          password: ${{ env.SSH_PASSWORD }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: 22
          envs: PG_USER,PG_PASSWORD,PG_DB,ENV_JWT,ENV_SCRAPERKEY,ENV_DISCORD,GH_REPO
          script_stop: true
          script: |
            set -e

            # ── Setup repo ───────────────────────────────────────────────
            mkdir -p ~/pokesnoop
            cd ~/pokesnoop

            if [ ! -d .git ]; then
              git init
            fi

            git remote remove origin 2>/dev/null || true
            git remote add origin "https://github.com/${GH_REPO}.git"

            git fetch --depth=1 origin main
            git checkout -B main FETCH_HEAD

            # ── Generate .env from secrets ────────────────────────────────
            PG_USER="${PG_USER:-pokemon}"
            PG_PASSWORD="${PG_PASSWORD:-pokemon}"
            PG_DB="${PG_DB:-pokemon}"

            cat > .env <<EOF
            DATABASE_URL=postgresql://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}
            POSTGRES_USER=${PG_USER}
            POSTGRES_PASSWORD=${PG_PASSWORD}
            POSTGRES_DB=${PG_DB}
            WEB_PORT=3333
            SCRAPER_API_BASE=http://web:3333/api
            API_BASE=http://localhost:3333/api
            JWT_SECRET=${ENV_JWT}
            SCRAPER_API_KEY=${ENV_SCRAPERKEY}
            DISCORD_WEBHOOK_URL=${ENV_DISCORD}
            EOF
            sed -i 's/^[[:space:]]*//' .env

            # ── Docker ───────────────────────────────────────────────────
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            $COMPOSE up -d --build
            $COMPOSE ps