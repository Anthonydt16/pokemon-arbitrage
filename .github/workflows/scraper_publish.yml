name: Run Scraper and Publish Report

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch: {}

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requirements (if present)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Run scraper and save report
        env:
          API_BASE: ${{ secrets.SCRAPER_API_BASE || 'http://localhost:3001/api' }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY || 'scraper-internal-key-2026' }}
        run: |
          mkdir -p out/scraper
          echo "Running scraper..." > out/scraper/report.txt
          # Attempt to run the main scraper; tolerate failure
          if python scraper/main.py >> out/scraper/report.txt 2>&1; then
            echo "scraper finished" >> out/scraper/report.txt
          else
            echo "scraper failed or produced no output (see log)" >> out/scraper/report.txt
          fi
          # Render a tiny HTML report
          cat > out/scraper/index.html <<'HTML'
<!doctype html>
<meta charset="utf-8">
<title>Scraper report</title>
<style>body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#071123;color:#e6eef8;padding:24px}</style>
<h1>Scraper run report</h1>
<pre>
HTML
          sed -e 's/&/&amp;/g; s/</\&lt;/g' out/scraper/report.txt >> out/scraper/index.html || true
          cat >> out/scraper/index.html <<'HTML'
</pre>
</body>
</html>
HTML

      - name: Deploy scraper report to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
